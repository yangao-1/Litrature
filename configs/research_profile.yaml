profile:
  name: zn-anode-interface-aqueous-zib
  domain: aqueous zinc-ion batteries
  updated_at: 2026-04-01

topics:
  - Zn metal anode interfacial regulation in aqueous Zn-ion batteries
  - Electrolyte chemistry engineering: pH buffer and ligand coordination (NH3 and acetate systems)
  - Zn2+ solvation and desolvation with deposition kinetics modulation
  - Hydrogel and polymer coating for Zn interface stabilization (SA-based systems)
  - Suppression of dendrite growth and HER via interfacial chemistry design

must_have_terms:
  - electrochemical impedance spectroscopy
  - EIS
  - Tafel analysis
  - polarization curves
  - linear sweep voltammetry
  - LSV
  - X-ray photoelectron spectroscopy
  - XPS
  - in situ
  - operando
  - Zn plating/stripping
  - coulombic efficiency
  - nucleation overpotential
  - solvation structure
  - desolvation energy

exclude_terms:
  - review
  - MXene
  - MOF
  - cathode
  - full cell performance
  - energy density
  - high capacity
  - composite material
  - nanostructure design
  - carbon coating

target_journals:
  tier_1:
    - Advanced Energy Materials
    - Energy and Environmental Science
    - Joule
  tier_2:
    - Nano Energy
    - Energy Storage Materials
    - ACS Energy Letters
  tier_3:
    - Journal of Power Sources
    - Electrochimica Acta
    - Chemical Engineering Journal

journal_policy:
  require_whitelist_match: false
  whitelist:
    - Advanced Energy Materials
    - Energy and Environmental Science
    - Joule
    - Nano Energy
    - Energy Storage Materials
    - ACS Energy Letters
    - Journal of Power Sources
    - Electrochimica Acta
    - Chemical Engineering Journal
