    - International Journal of Agriculture and Biology
    - Basrah Journal of Veterinary Research
    - Egyptian Journal of Medical Microbiology

mechanism_questions:
  - What changed at the Zn2+ interface?
  - How was HER suppressed?
  - Which specific step is changed by NH3 or acetate chemistry?

search_query_core: >
  ("zinc anode" OR "Zn metal") AND
  ("electrolyte" OR "interface" OR "coordination" OR "buffer" OR "hydrogel" OR "polymer") AND
  ("solvation" OR "desolvation" OR "nucleation" OR "interphase" OR "HER" OR "dendrite") NOT
  ("review" OR "MXene" OR "MOF" OR "cathode")

search_strategy:
  mode: multi_query
  queries:
    - '("zinc anode" OR "Zn metal") AND ("aqueous zinc-ion" OR "AZIB") AND ("electrolyte" OR "interface" OR "interfacial")'
    - '("zinc anode" OR "Zn metal") AND ("NH3" OR "ammonia" OR "acetate" OR "ligand coordination" OR "pH buffer")'
    - '("zinc anode" OR "Zn deposition" OR "Zn plating/stripping") AND ("solvation" OR "desolvation" OR "nucleation" OR "kinetics")'
    - '("zinc anode" OR "Zn metal") AND ("hydrogel" OR "polymer coating" OR "SA") AND ("HER" OR "dendrite")'
  merge_mode: union
  dedup_by: doi_then_title

quality_gate:
  require_mechanism_evidence: true
  minimum_method_hits: 2
  reject_if_only_performance_claims: true
